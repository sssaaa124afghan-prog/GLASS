<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل – GymPro AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #07070f;
      color: #eeeef5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      background: rgba(22, 22, 40, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 32px 24px;
      border: 1px solid rgba(255, 107, 53, 0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #ff6b35, #ff8c5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    p {
      color: #8888aa;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn {
      background: linear-gradient(135deg, #ff6b35, #ff8c5a);
      border: none;
      color: white;
      font-family: 'Cairo', sans-serif;
      font-weight: 800;
      font-size: 16px;
      padding: 14px 24px;
      border-radius: 16px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s;
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
    }
    .btn:active { transform: scale(0.97); }
    .hint {
      margin-top: 16px;
      font-size: 14px;
      color: #555575;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏋️‍♂️📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>لا تقلق! يمكنك متابعة استخدام التطبيق وعرض التمارين والجلسات السابقة. سيتم حفظ بياناتك محلياً ومزامنتها عند عودة الاتصال.</p>
    <button class="btn" onclick="window.location.reload()">🔄 إعادة المحاولة</button>
    <div class="hint">GymPro AI Titan Elite – قوتك في جيبك</div>
  </div>
</body>
</html>
